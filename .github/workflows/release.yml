name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build
        run: cargo build --profile dist --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          BIN_NAME=octopeek
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="$BIN_NAME-$VERSION-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/dist/$BIN_NAME" "$STAGE/"
          cp README.md LICENSE-MIT LICENSE-APACHE CHANGELOG.md "$STAGE/"
          tar -czf "$STAGE.tar.gz" "$STAGE"
          shasum -a 256 "$STAGE.tar.gz" > "$STAGE.tar.gz.sha256"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $bin = "octopeek"
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          $stage = "$bin-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/dist/$bin.exe" "$stage/"
          Copy-Item README.md, LICENSE-MIT, LICENSE-APACHE, CHANGELOG.md $stage
          Compress-Archive -Path "$stage" -DestinationPath "$stage.zip"
          $sha = (Get-FileHash "$stage.zip" -Algorithm SHA256).Hash.ToLower()
          "$sha  $stage.zip" | Out-File -FilePath "$stage.zip.sha256" -Encoding ascii

      - uses: actions/upload-artifact@v7
        with:
          name: octopeek-${{ matrix.target }}
          path: |
            octopeek-*.tar.gz
            octopeek-*.tar.gz.sha256
            octopeek-*.zip
            octopeek-*.zip.sha256
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
            artifacts/*.zip
            artifacts/*.zip.sha256
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
