name: Security

# Supply-chain checks run weekly and on any change to dependency manifests.
# Scheduled runs catch newly-disclosed RUSTSEC advisories even when the repo
# is quiet; PR-triggered runs catch issues before they land.
on:
  schedule:
    # Every Monday at 07:00 UTC — early enough for the week, late enough that
    # advisories published over the weekend are indexed.
    - cron: "0 7 * * 1"
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - ".github/workflows/security.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - ".github/workflows/security.yml"
  # Manual trigger for quick re-runs after landing a fix.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo audit
        # yaml-rust advisories (unmaintained) are also listed in deny.toml;
        # cargo-audit uses its own CLI flags. Keep the two lists in sync.
        run: cargo audit --deny warnings --ignore RUSTSEC-2024-0320 --ignore RUSTSEC-2025-0141

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          log-level: warn
